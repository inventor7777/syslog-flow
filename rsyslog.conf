$umask 0000

module(load="imudp")
module(load="imtcp")

input(type="imudp" port="514")
input(type="imtcp" port="514")

global(workDirectory="/var/spool/rsyslog")

template(
  name="DeviceLogFile"
  type="string"
  string="/logs/%timegenerated:::date-year%/%timegenerated:::date-month%/%timegenerated:::date-day%/%hostname:::secpath-replace%.log"
)

template(
  name="PlainLogLine"
  type="string"
  string="%timegenerated:::date-rfc3339% | %timereported:::date-rfc3339% %hostname% %syslogseverity-text% %syslogtag%%msg:::sp-if-no-1st-sp%%msg%\n"
)

action(
  type="omfile"
  dynaFile="DeviceLogFile"
  template="PlainLogLine"
  createDirs="on"
  dirCreateMode="0755"
  fileCreateMode="0644"
)
